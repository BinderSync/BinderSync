services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bindersync
      POSTGRES_PASSWORD: bindersync
      POSTGRES_DB: bindersync
    ports:
      - "5432:5432"
    volumes:
      - bindersync-db-data:/var/lib/postgresql/data

volumes:
  bindersync-db-data:
